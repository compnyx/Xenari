name: Xenari release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m pip install -e '.[dev]'
      - name: Require tag and package versions to match
        shell: bash
        run: |
          package_version="$(python -c 'from pathlib import Path; scope={}; exec(Path("src/xenari/_version.py").read_text(), scope); print(scope["__version__"])')"
          test "v${package_version}" = "${GITHUB_REF_NAME}"
      - run: ruff check .
      - run: mypy
      - run: pytest -q
      - run: python xenari_tool.py export-json --check
      - run: python xenari_tool.py export-runtime --check
      - run: python -m build
      - run: python -m pip install dist/*.whl
      - run: xenari doctor
      - run: xenari parity
      - run: xenari export-runtime --check
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
