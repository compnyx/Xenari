name: Xenari checks

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: ruff check .
      - run: mypy
      - run: coverage run -m pytest -q
      - run: coverage report

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python xenari_tool.py doctor
      - run: python xenari_tool.py parity
      - run: python xenari_tool.py export-json --check
      - run: python xenari_tool.py export-runtime --check
      - run: pytest -q

  wheel-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip wheel --no-deps . --wheel-dir dist
      - name: Smoke-test the installed wheel outside the checkout
        shell: bash
        run: |
          set -euo pipefail
          smoke_dir="$(mktemp -d)"
          python -m venv "$smoke_dir/venv"
          "$smoke_dir/venv/bin/python" -m pip install dist/*.whl
          cd "$smoke_dir"
          "$smoke_dir/venv/bin/python" -c "from xenari.paths import resolve_repo_root; assert resolve_repo_root() is None"
          "$smoke_dir/venv/bin/xenari" doctor
          "$smoke_dir/venv/bin/xenari" parity
          "$smoke_dir/venv/bin/xenari" export-runtime --check
